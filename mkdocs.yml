site_name: Global Security Community Wiki
site_description: Global Security Community Wiki Documentation
site_author: Global Security Community
site_url: https://globalsecurity.community/

theme:
  name: material
  font: false
  favicon: assets/favicon.svg
  logo: assets/favicon.svg
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: light
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - toc.integrate
    - navigation.top
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.annotation
    - content.code.copy
    - header.autohide

nav:
  - Home: index.md
  - Getting Started:
    - Start a New Chapter: start-new-chapter.md
    - Chapter Onboarding: chapter-onboarding.md
  - Chapter Leadership:
    - Chapter Leadership Guide: chapter-leadership-guide.md
  - Platform Guide:
    - Authentication & Accounts: platform/authentication.md
    - Chapters: platform/chapters.md
    - Chapter Lead Application: platform/chapter-application.md
    - Events: platform/events.md
    - Event Registration: platform/registration.md
    - My Tickets: platform/my-tickets.md
    - Chapter Dashboard: platform/dashboard.md
    - Check-In Scanner: platform/scanner.md
    - Digital Badges: platform/badges.md
  - Code of Conduct: code-of-conduct.md
  - Branding:
    - Community Branding Standards: community-branding-standards.md
  - Resources:
    - Event Photography Checklist: event-photography-checklist.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - admonition
  - pymdownx.arithmatex:
      generic: true
  - footnotes
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.mark
  - attr_list
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/discord
      link: https://discord.gg/mDRWDkCNPq
    - icon: fontawesome/brands/github
      link: https://github.com/Global-Security-Community

extra_css:
  - stylesheets/extra.css
